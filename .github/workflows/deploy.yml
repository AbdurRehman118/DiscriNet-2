name: Deploy to AWS EC2

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  EC2_APP_DIR: /home/ubuntu/hate-speech-detection

jobs:
  test:
    name: Lint & Smoke Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Import smoke test
        run: |
          python -c "
          import gradio, torch, transformers, peft, joblib, numpy
          from langchain_google_genai import ChatGoogleGenerativeAI
          from langchain_huggingface import HuggingFaceEmbeddings
          from langchain_community.vectorstores import FAISS
          from langchain_core.prompts import PromptTemplate
          print('All critical imports OK')
          "

  deploy:
    name: Deploy to EC2
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/ec2_key.pem
          chmod 600 ~/.ssh/ec2_key.pem
          cat >> ~/.ssh/config <<EOF
          Host ec2
            HostName ${{ secrets.EC2_HOST }}
            User ${{ secrets.EC2_USER }}
            IdentityFile ~/.ssh/ec2_key.pem
            StrictHostKeyChecking no
          EOF

      - name: Sync code to EC2
        run: |
          rsync -avz --delete \
            --exclude '.git' \
            --exclude '__pycache__' \
            --exclude '.env' \
            --exclude 'runs/' \
            --exclude 'results/' \
            --exclude 'policies/*.pt' \
            --exclude '*.pyc' \
            ./ ec2:${{ env.EC2_APP_DIR }}/

      - name: Install dependencies on EC2
        run: |
          ssh ec2 << 'ENDSSH'
          cd ${{ env.EC2_APP_DIR }}

          # Ensure Python venv exists
          if [ ! -d "venv" ]; then
            python3 -m venv venv
          fi
          source venv/bin/activate

          pip install --upgrade pip
          pip install -r requirements.txt
          ENDSSH

      - name: Write environment variables
        run: |
          ssh ec2 << 'ENDSSH'
          cat > ${{ env.EC2_APP_DIR }}/.env << 'ENVFILE'
          GEMINI_API_KEY_1=${{ secrets.GEMINI_API_KEY_1 }}
          GEMINI_API_KEY_2=${{ secrets.GEMINI_API_KEY_2 }}
          GEMINI_API_KEY_3=${{ secrets.GEMINI_API_KEY_3 }}
          GEMINI_API_KEY_4=${{ secrets.GEMINI_API_KEY_4 }}
          GEMINI_API_KEY_5=${{ secrets.GEMINI_API_KEY_5 }}
          GEMINI_API_KEY_6=${{ secrets.GEMINI_API_KEY_6 }}
          ENVFILE
          ENDSSH

      - name: Restart application
        run: |
          ssh ec2 << 'ENDSSH'
          cd ${{ env.EC2_APP_DIR }}
          source venv/bin/activate

          # Stop existing process if running
          if [ -f app.pid ]; then
            kill $(cat app.pid) 2>/dev/null || true
            rm -f app.pid
          fi

          # Launch Gradio app with nohup
          nohup python app.py > logs/app.log 2>&1 &
          echo $! > app.pid

          sleep 5
          if kill -0 $(cat app.pid) 2>/dev/null; then
            echo "App started successfully (PID: $(cat app.pid))"
          else
            echo "ERROR: App failed to start"
            tail -30 logs/app.log
            exit 1
          fi
          ENDSSH

      - name: Verify deployment
        run: |
          ssh ec2 << 'ENDSSH'
          cd ${{ env.EC2_APP_DIR }}
          sleep 10
          if kill -0 $(cat app.pid) 2>/dev/null; then
            echo "Deployment verified - app is running"
          else
            echo "Deployment FAILED - app crashed after start"
            tail -50 logs/app.log
            exit 1
          fi
          ENDSSH
